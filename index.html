<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>嘉鑫请点餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #f9fafb;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        * {
            box-sizing: border-box;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .cart-bounce { animation: bounce 0.3s ease; }
        
        @keyframes flyIn {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .item-fly-in { animation: flyIn 0.4s ease-out; }
        
        .category-active {
            background-color: white;
            color: #fbbf24;
            border-left: 3px solid #fbbf24;
            font-weight: 600;
        }
        
        /* 购物车弹窗 */
        .cart-popup {
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }
        .cart-popup.show {
            transform: translateY(0);
        }
        
        .cart-overlay {
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .cart-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        /* 底部购物车栏 - 空状态 (灰色不可用) */
        .cart-bar-empty {
            background: #9ca3af !important;
            pointer-events: none;
        }
        .cart-bar-empty .cart-btn,
        .cart-bar-empty .checkout-btn {
            opacity: 0.5;
            pointer-events: none;
        }
        
        /* 底部购物车栏 - 有商品状态 (深色激活) */
        .cart-bar-active {
            background: #1f2937 !important;
            pointer-events: auto;
        }
        
        /* 固定底部栏 - 核心修复：确保显示 */
        .bottom-cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 9999; /* 提高z-index确保不被遮挡 */
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.15);
            transition: background 0.2s;
            height: 70px; /* 固定高度 */
            display: flex;
            align-items: center;
        }
        
        /* 主内容区 - 留出底部空间 */
        .main-wrapper {
            min-height: 100vh;
            padding-bottom: 70px; /* 匹配底部栏高度 */
        }
        
        .main-content { 
            height: calc(100vh - 240px);
            overflow: hidden;
        }
        
        .shop-logo {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        /* 结算页面动画 */
        @keyframes cooking {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .cooking-animation {
            animation: cooking 2s ease-in-out infinite;
        }
        
        @keyframes steam {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-20px) scale(1.5); opacity: 0; }
        }
        .steam {
            animation: steam 2s ease-out infinite;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 主容器 - 新增wrapper确保底部空间 -->
    <div class="main-wrapper">
        <!-- 主页面内容 -->
        <div id="mainPage">
            <!-- 顶部商家信息栏 (保持不变) -->
            <header class="bg-white shadow-sm sticky top-0 z-40">
                <div class="bg-yellow-400 px-4 py-3 flex items-center justify-between">
                    <div class="flex items-center text-gray-800">
                        <i class="fas fa-chevron-left mr-2 text-lg"></i>
                        <h1 class="text-lg font-bold">嘉鑫请点餐</h1>
                    </div>
                    <div class="flex items-center gap-4 text-gray-800">
                        <i class="fas fa-share-alt text-lg"></i>
                        <i class="fas fa-ellipsis-h text-lg"></i>
                    </div>
                </div>
                
                <div class="px-4 py-4">
                    <div class="flex gap-4">
                        <img src="./logo.jpg" 
                            class="shop-logo" 
                            id="shopLogo"
                            alt="小高餐厅logo"
                            onerror="this.src='https://github.com/NewHand-Max/jiaxing_order/raw/main/images/logo.jpg'">
                        
                        <div class="flex-1">
                            <h2 class="font-bold text-xl text-gray-800 mb-1">小高餐厅（杭州店）</h2>
                            <div class="flex items-center gap-2 text-sm text-gray-500 mb-2">
                                <span class="flex items-center gap-1 bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded text-xs">
                                    <i class="fas fa-star text-xs"></i>
                                    <span class="font-bold">5.0</span>
                                </span>
                                <span>月售 1314+</span>
                                <span>人均 ¥52.0</span>
                            </div>
                            <div class="flex items-center gap-2 text-xs text-gray-500">
                                <span class="bg-green-50 text-green-600 px-2 py-1 rounded">30分钟送达</span>
                                <span>距离 800m</span>
                            </div>
                        </div>
                        <div class="text-center flex flex-col items-center justify-center">
                            <div class="w-10 h-10 rounded-full bg-yellow-50 flex items-center justify-center mb-1">
                                <i class="fas fa-heart text-yellow-500"></i>
                            </div>
                            <span class="text-xs text-gray-500">收藏</span>
                        </div>
                    </div>
                    
                    <div class="mt-3 flex items-center gap-2 text-xs text-gray-500 bg-gray-50 p-3 rounded-lg">
                        <span class="bg-yellow-400 text-white px-2 py-0.5 rounded font-bold">公告</span>
                        <span class="truncate">欢迎光临小高餐厅！本店主营嘉鑫爱吃菜，食材新鲜，现点现做。现在下单立减1元！</span>
                    </div>
                    
                    <div class="flex gap-2 mt-3 overflow-x-auto no-scrollbar pb-1">
                        <div class="flex-shrink-0 bg-red-50 border border-red-200 rounded-full px-3 py-1.5 text-xs text-red-600 flex items-center gap-1">
                            <i class="fas fa-yen-sign"></i>
                            <span>满20减8</span>
                        </div>
                        <div class="flex-shrink-0 bg-red-50 border border-red-200 rounded-full px-3 py-1.5 text-xs text-red-600 flex items-center gap-1">
                            <i class="fas fa-ticket-alt"></i>
                            <span>新客立减5元</span>
                        </div>
                        <div class="flex-shrink-0 bg-blue-50 border border-blue-200 rounded-full px-3 py-1.5 text-xs text-blue-600 flex items-center gap-1">
                            <i class="fas fa-truck"></i>
                            <span>满30免配送费</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- 主体内容区 (分类+商品) -->
            <div class="flex main-content" style="height: calc(100vh - 240px);">
                <aside class="w-24 bg-gray-100 overflow-y-auto no-scrollbar" id="categoryList"></aside>
                <main class="flex-1 bg-white overflow-y-auto no-scrollbar" id="foodList"></main>
            </div>
        </div>
    </div>

    <!-- 底部固定购物车栏 (核心优化) -->
    <div class="bottom-cart-bar cart-bar-empty" id="bottomCartBar">
        <div class="flex items-center justify-between px-4 py-3 text-white w-full">
            <!-- 左侧：购物车图标（点击弹出清单） -->
            <div class="flex items-center gap-3 cursor-pointer flex-1" id="cartIconArea" onclick="toggleCartDetail()">
                <div class="relative">
                    <div class="w-12 h-12 bg-gray-700 rounded-full flex items-center justify-center border-2 border-gray-500 transition-all" id="cartIconBg">
                        <i class="fas fa-shopping-cart text-xl text-gray-400 transition-colors" id="cartIcon"></i>
                    </div>
                    <span id="cartBadge" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center hidden font-bold">0</span>
                </div>
                <div class="flex flex-col">
                    <span class="font-bold text-lg" id="totalPrice">¥0</span>
                    <span class="text-xs text-gray-300">另需配送费 ¥3</span>
                </div>
            </div>
            
            <!-- 右侧：清空和结算按钮 (disabled状态由类控制) -->
            <div class="flex items-center gap-2">
                <button onclick="clearCart()" class="cart-btn px-4 py-2 rounded-full bg-gray-600 text-sm font-medium disabled:opacity-50 transition" id="clearBtn" disabled>
                    清空
                </button>
                <button onclick="goToCheckout()" class="checkout-btn px-6 py-2 rounded-full bg-yellow-400 text-gray-900 font-bold text-sm disabled:opacity-50 transition" id="checkoutBtn" disabled>
                    去结算
                </button>
            </div>
        </div>
    </div>

    <!-- 购物车详情弹窗（从底部弹出） -->
    <div id="cartOverlay" class="cart-overlay fixed inset-0 bg-black bg-opacity-50 z-9998" onclick="toggleCartDetail()"></div>
    
    <div id="cartDetail" class="cart-popup fixed left-0 right-0 bottom-[70px] bg-white rounded-t-2xl max-h-[60vh] shadow-2xl z-9999">
        <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl">
            <div class="flex items-center gap-2">
                <span class="font-bold text-gray-700">已选商品</span>
                <span class="text-xs text-gray-400" id="cartCountText">共0件</span>
            </div>
            <div class="text-sm text-gray-500">
                总计: <span class="text-red-500 font-bold" id="popupTotal">¥0</span>
            </div>
        </div>
        <div class="overflow-y-auto max-h-[40vh] p-4 space-y-3" id="cartItems">
            <!-- 动态生成购物车商品 -->
        </div>
        <!-- 弹窗底部按钮 -->
        <div class="p-4 border-t bg-gray-50 flex gap-3 rounded-b-2xl">
            <button onclick="clearCart()" class="flex-1 py-3 rounded-full bg-gray-200 text-gray-700 font-medium hover:bg-gray-300 transition-colors">
                清空购物车
            </button>
            <button onclick="goToCheckout()" class="flex-1 py-3 rounded-full bg-yellow-400 text-gray-900 font-bold hover:bg-yellow-300 transition-colors">
                去结算
            </button>
        </div>
    </div>

    <!-- 结算成功页面（默认隐藏） -->
    <div id="checkoutPage" class="hidden fixed inset-0 bg-white z-9999 flex flex-col items-center justify-center p-8">
        <button onclick="backToMenu()" class="absolute top-4 left-4 text-gray-600 hover:text-gray-800">
            <i class="fas fa-arrow-left text-xl"></i> 返回
        </button>
        
        <div class="text-center max-w-md w-full">
            <!-- 烹饪动画图片区域 (使用更稳定的图片) -->
            <div class="relative mb-8">
                <img src="https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=400&h=400&fit=crop" 
                    alt="烹饪中" 
                    class="w-64 h-64 object-cover rounded-full mx-auto shadow-lg cooking-animation"
                    onerror="this.src='https://via.placeholder.com/400?text=🍳+烹饪中'">
                
                <!-- 蒸汽动画 -->
                <div class="absolute top-0 left-1/2 -translate-x-1/2 flex gap-2">
                    <div class="steam w-2 h-2 bg-gray-300 rounded-full" style="animation-delay: 0s;"></div>
                    <div class="steam w-2 h-2 bg-gray-300 rounded-full" style="animation-delay: 0.5s;"></div>
                    <div class="steam w-2 h-2 bg-gray-300 rounded-full" style="animation-delay: 1s;"></div>
                </div>
            </div>
            
            <h2 class="text-2xl font-bold text-gray-800 mb-4">订单已提交！</h2>
            <p class="text-lg text-gray-600 mb-2 cooking-text">后厨小高正在加急烹饪中</p>
            <p class="text-gray-500 mb-8">请耐心等待……</p>
            
            <!-- 订单信息 -->
            <div class="bg-gray-50 rounded-lg p-4 mb-6 text-left">
                <div class="flex justify-between mb-2">
                    <span class="text-gray-600">订单编号</span>
                    <span class="font-mono text-gray-800" id="orderId">#20240304001</span>
                </div>
                <div class="flex justify-between mb-2">
                    <span class="text-gray-600">预计送达</span>
                    <span class="text-gray-800 font-medium">12:30</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-600">实付金额</span>
                    <span class="text-red-500 font-bold text-lg" id="finalPrice">¥0</span>
                </div>
            </div>
            
            <button onclick="backToMenu()" class="w-full py-3 rounded-full bg-yellow-400 text-gray-900 font-bold hover:bg-yellow-300 transition-colors">
                继续点餐
            </button>
        </div>
    </div>

    <!-- 商品详情弹窗 (带规格选择，价格联动已修复) -->
    <div class="fixed inset-0 z-9999 hidden" id="productModal">
        <div class="absolute inset-0 bg-black bg-opacity-60" onclick="closeProductModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-4 max-h-[80vh] overflow-y-auto animate-[flyIn_0.3s_ease-out]">
            <button onclick="closeProductModal()" class="absolute top-4 right-4 w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center z-10 hover:bg-gray-200 transition-colors">
                <i class="fas fa-times text-gray-600"></i>
            </button>
            <img id="modalImg" src="" class="w-full h-48 object-cover rounded-lg mb-4" alt="">
            <h2 id="modalTitle" class="text-xl font-bold text-gray-800 mb-2"></h2>
            <p id="modalDesc" class="text-gray-500 text-sm mb-4"></p>
            <div class="flex items-center gap-2 mb-4">
                <span class="text-2xl font-bold text-red-500">¥<span id="modalPrice"></span></span>
                <span class="text-gray-400 line-through text-sm">¥<span id="modalOriginalPrice"></span></span>
            </div>
            <div class="mb-4" id="specsContainer">
                <h3 class="font-bold text-sm mb-2">规格</h3>
                <div class="flex gap-2 flex-wrap" id="specsList"></div>
            </div>
            <button onclick="addToCartFromModal()" class="w-full bg-yellow-400 text-gray-900 py-3 rounded-full font-bold text-lg shadow-lg active:scale-95 transition-transform hover:bg-yellow-300">
                加入购物车
            </button>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 商品数据增强：每个商品包含规格列表 (修复规格价格联动) ----------
            const baseProducts = [
                { id: 1, category: 'hot', name: '东坡肉套餐', desc: '肥而不腻，杭帮菜经典，配米饭和小菜', price: 1, originalPrice: 48, sales: 1200, img: './images/11.jpg', tags: ['招牌', '月售1200+'] },
                { id: 2, category: 'hot', name: '西湖醋鱼', desc: '鲜嫩草鱼，酸甜适口，杭州传统名菜', price: 1, originalPrice: 88, sales: 890, img: './images/12.jpg', tags: ['新品', '月售890+'] },
                { id: 3, category: 'combo', name: '双人杭帮套餐', desc: '东坡肉+西湖醋鱼+2份米饭+饮料2杯', price: 1, originalPrice: 148, sales: 560, img: 'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=400&h=300&fit=crop', tags: ['省40元'] },
                { id: 4, category: 'combo', name: '家庭欢聚套餐', desc: '4菜1汤+4份米饭，适合3-4人', price: 1, originalPrice: 228, sales: 320, img: 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=400&h=300&fit=crop', tags: ['省60元'] },
                { id: 5, category: 'rice', name: '杭州卤肉饭', desc: '秘制卤肉，香糯可口', price: 1, originalPrice: 35, sales: 1500, img: './images/41.jpg', tags: ['热销'] },
                { id: 6, category: 'rice', name: '梅菜扣肉饭', desc: '咸香入味，下饭神器', price: 1, originalPrice: 40, sales: 980, img: './images/42.jpg', tags: ['推荐'] },
				{ id: 7, category: 'rice', name: '红烧甲鱼饭', desc: '咸香入味', price: 1, originalPrice: 98, sales: 980, img: './images/43.jpg', tags: ['推荐'] },
                { id: 8, category: 'noodle', name: '片儿川', desc: '杭州特色，雪菜笋片肉丝面', price: 1, originalPrice: 28, sales: 1100, img: 'https://images.unsplash.com/photo-1552611052-33e04de081de?w=400&h=300&fit=crop', tags: ['特色'] },
                { id: 9, category: 'noodle', name: '虾爆鳝面', desc: '鲜活虾仁，香酥鳝段', price: 1, originalPrice: 45, sales: 650, img: 'https://images.unsplash.com/photo-1612929633738-8fe44f7ec841?w=400&h=300&fit=crop', tags: [] },
                { id: 10, category: 'dish', name: '龙井虾仁', desc: '清新鲜美，茶香四溢', price: 1, originalPrice: 72, sales: 430, img: 'https://images.unsplash.com/photo-1563245372-f21724e3856d?w=400&h=300&fit=crop', tags: ['必点'] },
                { id: 11, category: 'dish', name: '叫花鸡', desc: '传统名菜，荷叶包裹，香气扑鼻', price: 1, originalPrice: 108, sales: 280, img: 'https://images.unsplash.com/photo-1598103442097-8b74394b95c6?w=400&h=300&fit=crop', tags: ['招牌'] },
                { id: 12, category: 'drink', name: '西湖龙井', desc: '明前龙井，清香回甘', price: 1, originalPrice: 20, sales: 800, img: 'https://images.unsplash.com/photo-1627435601361-ec25f5b1d0e5?w=400&h=300&fit=crop', tags: [] },
                { id: 13, category: 'dessert', name: '荷花酥', desc: '传统点心，层次分明', price: 1, originalPrice: 16, sales: 600, img: 'https://images.unsplash.com/photo-1563729784474-d77dbb933a9e?w=400&h=300&fit=crop', tags: ['推荐'] }
            ];

            // 为每个商品生成规格 (常规 / 大份)，大份+10元
            const products = baseProducts.map(p => ({
                ...p,
                specs: [
                    { id: 'regular', name: '常规', price: p.price },
                    { id: 'large', name: '大份', price: p.price + 10 }
                ]
            }));

            // 分类数据
            const categories = [
                { id: 'hot', name: '热销', icon: '🔥' },
                { id: 'discount', name: '优惠', icon: '🏷️' },
                { id: 'combo', name: '套餐', icon: '🍱' },
                { id: 'rice', name: '主食', icon: '🍚' },
                { id: 'noodle', name: '面食', icon: '🍜' },
                { id: 'dish', name: '小菜', icon: '🥘' },
                { id: 'drink', name: '饮品', icon: '🥤' },
                { id: 'dessert', name: '甜点', icon: '🍰' }
            ];

            // 购物车数据: key = "productId:specId" -> { count, price, specName, productName, productImg }
            let cart = {};
            let currentCategory = 'hot';
            let currentProduct = null;        // 当前查看的商品对象
            let selectedSpec = null;           // 当前选中的规格id

            // ---------- 初始化 ----------
            function init() {
                renderCategories();
                renderProducts();
                updateCartUI();
            }

            // 生成唯一键
            function getCartKey(productId, specId) {
                return `${productId}:${specId}`;
            }

            // 从键解析
            function parseCartKey(key) {
                const [pid, specId] = key.split(':');
                return { productId: parseInt(pid), specId };
            }

            // 渲染分类
            function renderCategories() {
                const container = document.getElementById('categoryList');
                container.innerHTML = categories.map(cat => `
                    <div class="p-3 text-sm text-gray-600 cursor-pointer transition-all ${cat.id === currentCategory ? 'category-active' : 'hover:bg-gray-200'}" 
                        onclick="switchCategory('${cat.id}')">
                        <div class="flex flex-col items-center gap-1">
                            <span class="text-lg">${cat.icon}</span>
                            <span>${cat.name}</span>
                        </div>
                    </div>
                `).join('');
            }

            window.switchCategory = function(id) {
                currentCategory = id;
                renderCategories();
                renderProducts();
            };

            // 渲染商品列表
            function renderProducts() {
                const container = document.getElementById('foodList');
                const filtered = products.filter(p => p.category === currentCategory);
                
                if (filtered.length === 0) {
                    container.innerHTML = '<div class="p-8 text-center text-gray-400">暂无商品</div>';
                    return;
                }

                container.innerHTML = filtered.map((product, index) => {
                    // 默认规格(regular)的数量
                    const defaultKey = getCartKey(product.id, 'regular');
                    const count = cart[defaultKey]?.count || 0;
                    return `
                    <div class="flex gap-3 p-3 border-b border-gray-100 item-fly-in" style="animation-delay: ${index * 0.05}s">
                        <img src="${product.img}" class="w-24 h-24 rounded-lg object-cover flex-shrink-0" alt="${product.name}" onclick="showProductDetail(${product.id})">
                        <div class="flex-1 flex flex-col justify-between">
                            <div onclick="showProductDetail(${product.id})">
                                <h3 class="font-bold text-gray-800 text-base mb-1">${product.name}</h3>
                                <p class="text-xs text-gray-500 line-clamp-2 mb-2">${product.desc}</p>
                                <div class="flex gap-1 mb-1">
                                    ${product.tags.map(tag => `<span class="text-[10px] border border-red-200 text-red-500 px-1 rounded">${tag}</span>`).join('')}
                                </div>
                                <div class="text-xs text-gray-400">月售${product.sales}</div>
                            </div>
                            <div class="flex items-center justify-between mt-2">
                                <div class="flex items-baseline gap-1">
                                    <span class="text-red-500 font-bold text-lg">¥${product.price}</span>
                                    <span class="text-gray-400 text-xs line-through">¥${product.originalPrice}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    ${count > 0 ? `
                                        <button onclick="updateCart(${product.id}, 'regular', -1)" class="w-7 h-7 rounded-full border border-gray-300 flex items-center justify-center text-gray-600 active:bg-gray-100 transition-colors">
                                            <i class="fas fa-minus text-xs"></i>
                                        </button>
                                        <span class="text-sm font-medium w-4 text-center">${count}</span>
                                    ` : ''}
                                    <button onclick="updateCart(${product.id}, 'regular', 1)" class="w-7 h-7 rounded-full bg-yellow-400 flex items-center justify-center text-gray-900 shadow-md active:scale-90 transition-transform">
                                        <i class="fas fa-plus text-xs"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');
            }

            // 更新购物车 (支持规格)
            window.updateCart = function(productId, specId, delta) {
                const product = products.find(p => p.id === productId);
                if (!product) return;
                const spec = product.specs.find(s => s.id === specId);
                if (!spec) return;

                const key = getCartKey(productId, specId);
                if (!cart[key]) {
                    // 初始化条目，存储快照信息
                    cart[key] = {
                        count: 0,
                        price: spec.price,
                        specName: spec.name,
                        productName: product.name,
                        productImg: product.img,
                        productId: productId
                    };
                }
                cart[key].count += delta;
                if (cart[key].count <= 0) {
                    delete cart[key];
                } else {
                    // 更新价格快照 (以防后台改价，但保留当前加入时的价格)
                    cart[key].price = spec.price;
                }

                // 添加动画
                if (delta > 0) {
                    const icon = document.getElementById('cartIconBg');
                    icon.classList.add('cart-bounce');
                    setTimeout(() => icon.classList.remove('cart-bounce'), 300);
                }

                renderProducts();          // 更新列表中的数量显示
                updateCartUI();            // 更新底部栏和弹窗
            };

            // 更新所有购物车UI (底部栏、徽章、弹窗)
            function updateCartUI() {
                const cartItems = Object.values(cart);
                const totalCount = cartItems.reduce((acc, item) => acc + item.count, 0);
                const totalPrice = cartItems.reduce((acc, item) => acc + (item.price * item.count), 0);
                const originalTotal = cartItems.reduce((acc, item) => {
                    const product = products.find(p => p.id === item.productId);
                    return acc + (product ? product.originalPrice * item.count : 0);
                }, 0);

                // 更新底部栏
                document.getElementById('totalPrice').textContent = `¥${totalPrice}`;
                document.getElementById('popupTotal').textContent = `¥${totalPrice}`;
                document.getElementById('cartCountText').textContent = `共${totalCount}件`;

                const badge = document.getElementById('cartBadge');
                const cartBar = document.getElementById('bottomCartBar');
                const clearBtn = document.getElementById('clearBtn');
                const checkoutBtn = document.getElementById('checkoutBtn');
                const cartIcon = document.getElementById('cartIcon');
                const cartIconBg = document.getElementById('cartIconBg');

                if (totalCount > 0) {
                    // 激活状态
                    badge.textContent = totalCount;
                    badge.classList.remove('hidden');
                    cartBar.classList.remove('cart-bar-empty');
                    cartBar.classList.add('cart-bar-active');
                    clearBtn.disabled = false;
                    checkoutBtn.disabled = false;
                    cartIcon.classList.remove('text-gray-400');
                    cartIcon.classList.add('text-yellow-400');
                    cartIconBg.classList.remove('bg-gray-700', 'border-gray-500');
                    cartIconBg.classList.add('bg-gray-800', 'border-yellow-400');
                } else {
                    // 空状态
                    badge.classList.add('hidden');
                    cartBar.classList.remove('cart-bar-active');
                    cartBar.classList.add('cart-bar-empty');
                    clearBtn.disabled = true;
                    checkoutBtn.disabled = true;
                    cartIcon.classList.remove('text-yellow-400');
                    cartIcon.classList.add('text-gray-400');
                    cartIconBg.classList.remove('bg-gray-800', 'border-yellow-400');
                    cartIconBg.classList.add('bg-gray-700', 'border-gray-500');

                    // 关闭弹窗
                    document.getElementById('cartDetail').classList.remove('show');
                    document.getElementById('cartOverlay').classList.remove('show');
                }

                renderCartDetail(); // 重新渲染购物车弹窗内容
            }

            // 渲染购物车详情弹窗
            function renderCartDetail() {
                const container = document.getElementById('cartItems');
                const entries = Object.entries(cart);

                if (entries.length === 0) {
                    container.innerHTML = '<div class="text-center text-gray-400 py-8">购物车是空的</div>';
                    return;
                }

                container.innerHTML = entries.map(([key, item]) => {
                    const { productId, specId } = parseCartKey(key);
                    const product = products.find(p => p.id === productId);
                    if (!product) return '';
                    return `
                    <div class="flex items-center justify-between py-3 border-b border-gray-100 last:border-0">
                        <div class="flex items-center gap-3 flex-1">
                            <img src="${item.productImg}" class="w-12 h-12 rounded object-cover" alt="${item.productName}">
                            <div class="flex-1">
                                <div class="font-medium text-gray-800 text-sm">${item.productName} <span class="text-xs text-gray-400">(${item.specName})</span></div>
                                <div class="text-xs text-gray-500">¥${item.price}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="updateCart(${productId}, '${specId}', -1)" class="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center text-gray-600 active:bg-gray-100">
                                <i class="fas fa-minus text-xs"></i>
                            </button>
                            <span class="w-6 text-center font-medium text-sm">${item.count}</span>
                            <button onclick="updateCart(${productId}, '${specId}', 1)" class="w-8 h-8 rounded-full bg-yellow-400 flex items-center justify-center text-gray-900 shadow-sm">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                    `;
                }).join('');
            }

            // 切换购物车弹窗
            window.toggleCartDetail = function() {
                const detail = document.getElementById('cartDetail');
                const overlay = document.getElementById('cartOverlay');
                const isShow = detail.classList.contains('show');
                const totalCount = Object.values(cart).reduce((a, b) => a + b.count, 0);
                
                if (totalCount === 0) return; // 空车不弹
                
                if (isShow) {
                    detail.classList.remove('show');
                    overlay.classList.remove('show');
                } else {
                    detail.classList.add('show');
                    overlay.classList.add('show');
                }
            };

            // 清空购物车
            window.clearCart = function() {
                if (Object.keys(cart).length === 0) return;
                if (confirm('确定清空购物车吗？')) {
                    cart = {};
                    renderProducts();
                    updateCartUI();
                }
            };

            // 去结算
            window.goToCheckout = function() {
                const totalCount = Object.values(cart).reduce((a, b) => a + b.count, 0);
                if (totalCount === 0) return;

                // 计算实际总价 (含配送费3元)
                const subtotal = Object.values(cart).reduce((sum, item) => sum + item.price * item.count, 0);
                const finalTotal = subtotal + 3;

                // 生成订单号
                const now = new Date();
                const orderId = '#' + now.getFullYear() + 
                    String(now.getMonth()+1).padStart(2,'0') + 
                    String(now.getDate()).padStart(2,'0') + 
                    Math.floor(Math.random()*1000).toString().padStart(3,'0');
                document.getElementById('orderId').textContent = orderId;
                document.getElementById('finalPrice').textContent = `¥${finalTotal}`;

                // 显示结算页面
                document.getElementById('mainPage').classList.add('hidden');
                document.getElementById('checkoutPage').classList.remove('hidden');

                // 清空购物车 (下单后清空)
                cart = {};
                renderProducts();
                updateCartUI();
            };

            window.backToMenu = function() {
                document.getElementById('checkoutPage').classList.add('hidden');
                document.getElementById('mainPage').classList.remove('hidden');
            };

            // 商品详情
            window.showProductDetail = function(productId) {
                const product = products.find(p => p.id === productId);
                if (!product) return;
                currentProduct = product;
                selectedSpec = 'regular'; // 默认选中常规

                // 填充基础信息
                document.getElementById('modalImg').src = product.img;
                document.getElementById('modalTitle').textContent = product.name;
                document.getElementById('modalDesc').textContent = product.desc;
                document.getElementById('modalPrice').textContent = product.specs.find(s => s.id === 'regular').price;
                document.getElementById('modalOriginalPrice').textContent = product.originalPrice;

                // 渲染规格按钮
                const specsList = document.getElementById('specsList');
                specsList.innerHTML = product.specs.map(spec => `
                    <button onclick="selectSpec('${spec.id}')" 
                        class="px-4 py-2 rounded-lg border transition-all ${selectedSpec === spec.id ? 'bg-yellow-100 border-yellow-400 text-yellow-700' : 'border-gray-200 text-gray-600'} text-sm">
                        ${spec.name} ¥${spec.price}
                    </button>
                `).join('');

                document.getElementById('productModal').classList.remove('hidden');
            };

            window.selectSpec = function(specId) {
                if (!currentProduct) return;
                selectedSpec = specId;
                const spec = currentProduct.specs.find(s => s.id === specId);
                if (spec) {
                    document.getElementById('modalPrice').textContent = spec.price;
                }
                // 重新渲染高亮 (通过重新调用详情，简单刷新)
                showProductDetail(currentProduct.id);
            };

            window.addToCartFromModal = function() {
                if (!currentProduct || !selectedSpec) return;
                updateCart(currentProduct.id, selectedSpec, 1);
                closeProductModal();
            };

            window.closeProductModal = function() {
                document.getElementById('productModal').classList.add('hidden');
                currentProduct = null;
            };

            // 启动
            init();
        })();
    </script>
</body>
</html>
